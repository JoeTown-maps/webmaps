<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        
        <style>
            #map { height: calc(100vh - 150px); }  /* Adjust 120px based on header height */   
        </style>
        
        <title>Saint Joseph Historic Districts</title>
    </head>
    <body>
        <div id="header" style="background-color: #2c3e50; color: white; padding: 10px; text-align: center; font-family: Arial, sans-serif;">
              <!-- <img src="path/to/your-logo.png" alt="Old Town North Neighborhood Association" style="height: 60px; margin-right: 15px;"> -->
              <h1 style="margin: 5px 0;">The Historic Districts of Saint Joseph, Missouri</h1>
              <p style="margin: 0; font-size: 14px;">© 2026 Walter Eis</p>
        </div>	
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/Roads_1.js"></script><script src="layers/SaintJosephBoundary_2.js"></script><script src="layers/StJosephHistoricDistricts_3.js"></script><script src="layers/MissouriRiver_4.js"></script>
        <script src="styles/Roads_1_style.js"></script><script src="styles/SaintJosephBoundary_2_style.js"></script><script src="styles/StJosephHistoricDistricts_3_style.js"></script><script src="styles/MissouriRiver_4_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
        <div id="footer" style="background-color: #f8f9fa; padding: 10px; text-align: center; font-size: 12px; border-top: 1px solid #ddd; margin-top: 20px;">
          <p>Data from public sources</p>
          <p>Created with QGIS & OpenLayers | Questions? Contact joetownmaps@gmail.com</p>
        </div> 
    </body>
</html>
